# Fork Configuration
# Used by scripts/rebuild-fork.sh and scripts/rebase-features.sh
#
# PINNED_TAG: The upstream n8n release tag to base the fork on.
# Update this when upgrading to a new n8n release.
PINNED_TAG=n8n@2.10.2

# FEATURE_BRANCHES: Space-separated list of feature branches to merge into main-fork.
# Each branch should contain isolated, rebased changes on top of PINNED_TAG.
# Order matters: branches are merged in the order listed.
FEATURE_BRANCHES=(
  feature/api-share-credentials
  feature/expose-project-fields
)

# FORK_BRANCH: The integration branch that combines the pinned tag + features.
FORK_BRANCH=main-fork

# IMAGE_NAME: Docker image name for the custom build.
IMAGE_NAME=bonzai/n8n
